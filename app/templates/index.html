<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商运营数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
<main class="container">
    <h1>电商运营数据分析看板</h1>
    <section class="panel filter-panel">
        <div class="filters">
            <label>开始时间 <input type="datetime-local" id="start-time"></label>
            <label>结束时间 <input type="datetime-local" id="end-time"></label>
            <label>地区
                <select id="region">
                    <option value="">全部</option>
                </select>
            </label>
            <label>品类
                <select id="category">
                    <option value="">全部</option>
                </select>
            </label>
            <label>活动
                <select id="campaign">
                    <option value="">全部</option>
                </select>
            </label>
            <label>粒度
                <select id="granularity">
                    <option value="day">按日</option>
                    <option value="hour">按小时</option>
                    <option value="week">按周</option>
                </select>
            </label>
            <button id="apply-btn" type="button">应用筛选</button>
        </div>
        <div id="alerts" class="alerts"></div>
    </section>
    <div class="card-row" id="metrics">
        <div class="card"><h3>GMV</h3><p id="gmv">-</p></div>
        <div class="card"><h3>订单量</h3><p id="order-count">-</p></div>
        <div class="card"><h3>支付转化率</h3><p id="conversion">-</p></div>
        <div class="card"><h3>客单价</h3><p id="aov">-</p></div>
    </div>
    <div class="chart-grid">
        <section class="panel">
            <h2>GMV 趋势</h2>
            <div id="gmv-trend" class="chart"></div>
        </section>
        <section class="panel">
            <h2>用户分群分布</h2>
            <div id="segment-pie" class="chart"></div>
        </section>
    </div>
    <div class="chart-grid">
        <section class="panel">
            <h2>地区 GMV 分布</h2>
            <div id="region-bar" class="chart"></div>
        </section>
        <section class="panel">
            <h2>品类 GMV 分布</h2>
            <div id="category-bar" class="chart"></div>
        </section>
    </div>
    <section class="panel">
        <h2>营销活动效果对比</h2>
        <div class="table-wrap">
            <table id="campaign-table">
                <thead>
                <tr>
                    <th>活动</th>
                    <th>类型</th>
                    <th>订单量</th>
                    <th>GMV</th>
                    <th>券使用率</th>
                    <th>ROI</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>
</main>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
